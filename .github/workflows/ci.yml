# Quantum Shield Core — Continuous Integration
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check . --output-format=github
      - run: ruff format --check .

  security-python:
    name: Security (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit SAST
        run: bandit -r . --skip B101,B104,B105,B106,B108,B110,B404,B603,B607 --quiet
      - name: pip-audit
        run: pip-audit --desc on
      - name: Semgrep
        continue-on-error: true
        run: semgrep --config=auto --error .

  test-python:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install liboqs
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cd liboqs
          mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local ..
          ninja
          sudo ninja install
          sudo ldconfig
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/liboqs.conf
          sudo ldconfig
      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt
      - name: Build Rust engine (PyO3)
        working-directory: rust-engine
        continue-on-error: true
        run: |
          pip install maturin
          maturin develop
      - name: Run tests
        run: pytest tests/ -v --tb=short -x
        env:
          LD_LIBRARY_PATH: /usr/local/lib
          AUDIT_KEY: "test-audit-key-secure-enough-for-pytest-32chars!"
          API_KEY_OPERATOR: "test-operator-api-key-secure-enough-32chars!!"
          API_KEY_AUDITOR: "test-auditor-api-key-secure-enough-32chars!!!"
          DATABASE_URL: "sqlite+aiosqlite:///./test_ci.db"

  test-rust:
    name: Rust (Build + Tests)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: rust-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --release
      - name: Tests
        run: cargo test --release
      - name: cargo-audit
        continue-on-error: true
        run: |
          cargo install cargo-audit
          cargo audit
      - name: cargo-deny
        continue-on-error: true
        run: |
          cargo install cargo-deny
          cargo deny check

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/quantum-shield/core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
      - name: Lint Helm chart
        run: helm lint deploy/helm/quantum-shield/
