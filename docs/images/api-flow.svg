<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="800" height="400" fill="#f4f6f9"/>
  <text x="400" y="28" text-anchor="middle" fill="#1a2b42" font-size="16" font-weight="600">Seal / Unseal API Flow</text>
  <text x="100" y="70" fill="#1a2b42" font-size="12" font-weight="600">Client</text>
  <text x="350" y="70" fill="#1a2b42" font-size="12" font-weight="600">API</text>
  <text x="600" y="70" fill="#1a2b42" font-size="12" font-weight="600">Crypto + Audit</text>
  <line x1="100" y1="80" x2="100" y2="360" stroke="#cbd5e1" stroke-dasharray="4"/>
  <line x1="350" y1="80" x2="350" y2="360" stroke="#cbd5e1" stroke-dasharray="4"/>
  <line x1="600" y1="80" x2="600" y2="360" stroke="#cbd5e1" stroke-dasharray="4"/>
  <text x="100" y="110" text-anchor="middle" fill="#5a6b7d" font-size="10">1. POST /seal</text>
  <line x1="100" y1="115" x2="350" y2="115" stroke="#2c5282" stroke-width="1.5" marker-end="url(#f)"/>
  <text x="350" y="145" text-anchor="middle" fill="#5a6b7d" font-size="10">2. RBAC check</text>
  <line x1="350" y1="150" x2="600" y2="150" stroke="#2c5282" stroke-width="1.5" marker-end="url(#f)"/>
  <text x="600" y="180" text-anchor="middle" fill="#5a6b7d" font-size="10">3. Kyber + AES-GCM</text>
  <line x1="600" y1="185" x2="350" y2="185" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#f)"/>
  <text x="350" y="215" text-anchor="middle" fill="#5a6b7d" font-size="10">4. HMAC audit log</text>
  <line x1="350" y1="220" x2="100" y2="220" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#f)"/>
  <text x="100" y="260" text-anchor="middle" fill="#5a6b7d" font-size="10">5. POST /unseal</text>
  <line x1="100" y1="265" x2="600" y2="265" stroke="#2c5282" stroke-width="1.5" marker-end="url(#f)"/>
  <text x="600" y="300" text-anchor="middle" fill="#5a6b7d" font-size="10">6. Verify AAD context</text>
  <rect x="250" y="330" width="300" height="40" rx="4" fill="#fff3cd" stroke="#d69e2e"/>
  <text x="400" y="355" text-anchor="middle" fill="#856404" font-size="11">Wrong context � 401 (opaque error)</text>
  <defs><marker id="f" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2c5282"/></marker></defs>
</svg>
