<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Consolas, monospace">
  <rect width="720" height="360" fill="#0d1117"/>
  <text x="20" y="30" fill="#58a6ff" font-size="14" font-family="Segoe UI, sans-serif" font-weight="600">GET /metrics</text>
  <text x="20" y="60" fill="#8b949e" font-size="11"># HELP qshield_crypto_operations_total</text>
  <text x="20" y="78" fill="#7ee787" font-size="11">qshield_crypto_operations_total{operation="seal"} 1247</text>
  <text x="20" y="96" fill="#7ee787" font-size="11">qshield_crypto_operations_total{operation="unseal"} 1198</text>
  <text x="20" y="114" fill="#7ee787" font-size="11">qshield_audit_writes_total 2445</text>
  <text x="20" y="140" fill="#8b949e" font-size="11"># HELP http_request_duration_seconds</text>
  <text x="20" y="158" fill="#ffa657" font-size="11">http_request_duration_seconds_bucket{le="0.1"} 892</text>
  <text x="20" y="176" fill="#ffa657" font-size="11">http_request_duration_seconds_bucket{le="0.5"} 1201</text>
  <text x="20" y="210" fill="#8b949e" font-size="11" font-family="Segoe UI, sans-serif">Custom + Instrumentator metrics � scrape with Prometheus</text>
  <rect x="20" y="240" width="680" height="80" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="36" y="268" fill="#c9d1d9" font-size="11" font-family="Segoe UI, sans-serif">Grafana dashboard: crypto ops rate, audit writes, p95 latency</text>
  <text x="36" y="290" fill="#8b949e" font-size="10" font-family="Segoe UI, sans-serif">Correlation-ID in JSON logs for trace join</text>
</svg>
