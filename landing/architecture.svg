<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #111b2e; stroke: #3d8bfd; stroke-width: 1.5; }
      .db { fill: #111b2e; stroke: #5a7a9a; stroke-width: 1.5; }
      .label { fill: #e8eef7; font-size: 13px; font-weight: 600; }
      .sub { fill: #8fa3bf; font-size: 11px; }
      .arrow { stroke: #3d8bfd; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3d8bfd"/>
    </marker>
  </defs>
  <rect width="800" height="320" fill="#0b1220"/>
  <text x="400" y="28" text-anchor="middle" class="label" font-size="15">Quantum Shield  Logical Architecture</text>
  <rect x="40" y="60" width="140" height="70" rx="4" class="box"/>
  <text x="110" y="88" text-anchor="middle" class="label">Client / SIEM</text>
  <text x="110" y="108" text-anchor="middle" class="sub">HTTPS + API Key</text>
  <rect x="240" y="50" width="200" height="90" rx="4" class="box"/>
  <text x="340" y="82" text-anchor="middle" class="label">FastAPI Enclave</text>
  <text x="340" y="102" text-anchor="middle" class="sub">Seal / Unseal / Audit</text>
  <text x="340" y="118" text-anchor="middle" class="sub">RBAC + Rate limits</text>
  <rect x="500" y="60" width="120" height="70" rx="4" class="box"/>
  <text x="560" y="92" text-anchor="middle" class="label">liboqs</text>
  <text x="560" y="112" text-anchor="middle" class="sub">ML-KEM-768</text>
  <rect x="660" y="60" width="100" height="70" rx="4" class="box"/>
  <text x="710" y="92" text-anchor="middle" class="label">KMS</text>
  <text x="710" y="112" text-anchor="middle" class="sub">Audit HMAC</text>
  <rect x="280" y="200" width="160" height="70" rx="4" class="db"/>
  <text x="360" y="232" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="360" y="252" text-anchor="middle" class="sub">Audit + API keys</text>
  <rect x="500" y="200" width="140" height="70" rx="4" class="db"/>
  <text x="570" y="232" text-anchor="middle" class="label">Prometheus</text>
  <text x="570" y="252" text-anchor="middle" class="sub">/metrics</text>
  <line x1="180" y1="95" x2="238" y2="95" class="arrow"/>
  <line x1="440" y1="95" x2="498" y2="95" class="arrow"/>
  <line x1="440" y1="110" x2="658" y2="110" class="arrow"/>
  <line x1="360" y1="140" x2="360" y2="198" class="arrow"/>
  <line x1="400" y1="140" x2="540" y2="198" class="arrow"/>
</svg>
