# ============================================================================
# Quantum Shield Core — Helm values
# ============================================================================
# Production-ready configuration for enterprise Kubernetes deployments.
# ============================================================================

# --- Global settings ---
global:
  imageRegistry: ""
  imagePullSecrets: []

# --- Image ---
image:
  repository: quantum-shield/core
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# --- Replicas ---
replicaCount: 2

# --- Strategy ---
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# --- Service Account ---
serviceAccount:
  create: true
  annotations: {}
  name: ""

# --- RBAC ---
rbac:
  create: true
  # Required for KMS integration (AWS IRSA, etc.)
  extraRules: []
  # - apiGroups: [""]
  #   resources: ["secrets"]
  #   verbs: ["get", "list"]

# --- Pod Security Context ---
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8888
  runAsGroup: 8888
  fsGroup: 8888
  seccompProfile:
    type: RuntimeDefault

# --- Container Security Context ---
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 8888
  privileged: false

# --- Service ---
service:
  type: ClusterIP
  port: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

# --- Ingress ---
ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "X-API-Key,Content-Type,X-Correlation-ID"
  hosts:
    - host: quantum-shield.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: quantum-shield-tls
      hosts:
        - quantum-shield.internal

# --- Resources ---
resources:
  requests:
    memory: "256Mi"
    cpu: "500m"
  limits:
    memory: "768Mi"
    cpu: "2"

# --- Horizontal Pod Autoscaler ---
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60

# --- Pod Disruption Budget ---
pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# --- Probes ---
probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startup:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# --- Environment Variables ---
env:
  # Logging
  LOG_LEVEL: "INFO"
  SQL_ECHO: "false"
  ENABLE_DOCS: "false"
  ENABLE_HSTS: "true"

  # API
  ALLOWED_ORIGINS: ""
  UVICORN_WORKERS: "4"
  UVICORN_TIMEOUT_KEEP_ALIVE: "30"

  # KMS Provider (local | aws | vault | azure)
  KMS_PROVIDER: "local"
  ACTIVE_AUDIT_KEY_VERSION: "v1"

  # Vault (when KMS_PROVIDER=vault)
  # VAULT_ADDR: "http://vault:8200"
  # VAULT_KV_PATH: "quantum-shield/audit-keys"
  # VAULT_KV_MOUNT: "secret"

  # AWS KMS (when KMS_PROVIDER=aws)
  # AWS_REGION: "eu-west-1"
  # AWS_KMS_KEY_ID: "alias/quantum-shield-audit"

# --- Secrets from environment variables ---
# Use external-secrets, Vault CSI, or AWS Secrets Manager in production.
# These are only for demo/dev purposes.
secrets:
  # Audit HMAC keys (min 32 chars each)
  auditKeys:
    v1: "replace-with-32-char-audit-key-v1-minimum"
  # API keys (min 32 chars each)
  apiKeys:
    operator: "replace-with-32-char-operator-key-minimum"
    auditor: "replace-with-32-char-auditor-key-minimum"

# --- External Secrets (recommended for production) ---
externalSecrets:
  enabled: false
  # backendType: secretsManager  # aws | vault | gcp | azure
  # secretStoreRef:
  #   name: quantum-shield-secrets
  #   kind: SecretStore
  # auditKeyVersion: v1
  # refreshInterval: "1h"

# --- Vault Sidecar (for HashiCorp Vault KMS) ---
vaultSidecar:
  enabled: false
  image: hashicorp/vault:1.16
  role: quantum-shield
  path: secret/quantum-shield

# --- Database ---
postgresql:
  enabled: true
  image: postgres:16-alpine
  existingSecret: ""
  database: quantum_shield
  user: qshield
  password: "replace-with-postgres-password"
  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "1"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  metrics:
    enabled: false

# --- External Database ---
externalDatabase:
  enabled: false
  host: ""
  port: 5432
  database: quantum_shield
  user: qshield
  password: ""
  ssl: "require"

# --- Network Policy ---
networkPolicy:
  enabled: true
  ingressRules:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: quantum-shield
  egressRules:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: quantum-shield-postgresql
      ports:
        - port: 5432
          protocol: TCP

# --- Anti-Affinity ---
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - quantum-shield
          topologyKey: kubernetes.io/hostname

# --- Node Selector ---
nodeSelector: {}

# --- Tolerations ---
tolerations: []

# --- Topology Spread ---
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: quantum-shield

# --- Pod Annotations ---
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  sidecar.istio.io/inject: "true"

# --- Priority Class ---
priorityClassName: ""

# --- Termination Grace Period ---
terminationGracePeriodSeconds: 60

# --- Service Monitor ---
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# --- OpenTelemetry ---
opentelemetry:
  enabled: false
  endpoint: "otel-collector.monitoring:4317"
  insecure: true
  serviceName: "quantum-shield-core"

# --- Istio ---
istio:
  enabled: false
  mtls: true
  virtualService:
    gateways:
      - istio-ingress/quantum-shield-gateway

# --- TLS ---
tls:
  enabled: false
  certManager:
    enabled: false
    issuer:
      name: letsencrypt-prod
      kind: ClusterIssuer
  existingSecret: ""

# --- Image Pull Secrets ---
imagePullSecrets: []

# --- Name Overrides ---
nameOverride: ""
fullnameOverride: ""