apiVersion: v1
kind: Service
metadata:
  name: {{ include "quantum-shield.fullname" . }}
  labels:
    {{- include "quantum-shield.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "quantum-shield.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quantum-shield.postgresql.fullname" . }}
  labels:
    {{- include "quantum-shield.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/name: {{ include "quantum-shield.postgresql.fullname" . }}